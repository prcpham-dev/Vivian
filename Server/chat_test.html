<!DOCTYPE html>
<html>
    <head>
        <title>Vivian WebSocket Tester</title>
        <style>
            body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
            #messages { background: #f4f4f4; padding: 20px; height: 400px; overflow-y: scroll; border-radius: 8px; margin-bottom: 20px;}
            .config-bar { display: flex; gap: 10px; margin-bottom: 10px; }
            .config-bar input { flex: 1; padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px;}
            form { display: flex; gap: 10px; }
            form input { flex: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
            button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; background: #007bff; color: white; border-radius: 4px;}
            button:hover { background: #0056b3; }
        </style>
    </head>
    <body>
        <h1>Test Vivian WebSocket</h1>
        <div class="config-bar">
            <input type="text" id="workspaceInput" placeholder="Workspace Path (e.g. /Users/prc/project)" value="/Users/prc.__/Documents/codeMics/Vivian/Server/test/template" />
            <input type="text" id="sessionInput" placeholder="Session ID" />
        </div>
        <div id="messages"></div>
        <form action="" onsubmit="sendMessage(event)">
            <input type="text" id="messageText" autocomplete="off" placeholder="Type a message..."/>
            <button>Send</button>
        </form>
        
        <script>
            var ws = new WebSocket(`ws://${window.location.host}/ws`);
            var currentBotMessage = null;
            
            // Auto-generate a random session ID on load
            document.getElementById("sessionInput").value = "session-" + Math.random().toString(36).substr(2, 9);

            ws.onopen = function() {
                ws.send(JSON.stringify({event: "init"}));
                document.getElementById('messages').innerHTML += `<i>Connected to Vivian WebSocket!</i><br><br>`;
            };

            ws.onmessage = function(event) {
                var msg = JSON.parse(event.data);
                
                if (msg.event === "chatResponse") {
                    if (!msg.done && msg.text) {
                        currentBotMessage.innerHTML += msg.text.replace(/\n/g, '<br>');
                        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
                    } else if (msg.done) {
                        currentBotMessage = null;
                        document.getElementById('messages').innerHTML += "<br><br>";
                    }
                } else if (msg.event === "error") {
                    currentBotMessage.innerHTML += "<br><b style='color:red;'>Error: " + msg.message + "</b>";
                    currentBotMessage = null;
                }
            };

            function sendMessage(event) {
                var input = document.getElementById("messageText");
                var text = input.value;
                var workspace = document.getElementById("workspaceInput").value;
                var sessionId = document.getElementById("sessionInput").value;
                
                if (!workspace || !sessionId) {
                    alert("Please provide both Workspace Path and Session ID!");
                    event.preventDefault();
                    return;
                }
                
                document.getElementById('messages').innerHTML += `<b>You:</b> ${text}<br>`;
                document.getElementById('messages').innerHTML += "<b>Vivian:</b> ";
                currentBotMessage = document.createElement("span");
                document.getElementById('messages').appendChild(currentBotMessage);
                
                ws.send(JSON.stringify({
                    event: "chat", 
                    workspace_root: workspace,
                    session_id: sessionId,
                    text: text
                }));
                
                input.value = '';
                event.preventDefault();
            }
        </script>
    </body>
</html>
